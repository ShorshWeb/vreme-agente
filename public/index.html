<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asesor Virtual Vreme</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
    #vreme-agent { background: #ffffff; border-radius: 16px; overflow: hidden; width: 100%; max-width: 480px; height: 620px; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
    .agent-header { background: #1a3a5c; padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .agent-avatar { width: 38px; height: 38px; border-radius: 50%; background: #2e6da4; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .agent-avatar svg { width: 20px; height: 20px; }
    .agent-info { flex: 1; }
    .agent-name { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: #fff; line-height: 1.2; }
    .agent-status { font-size: 12px; color: #7eb8e8; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
    .vreme-logo { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; color: #7eb8e8; letter-spacing: 0.05em; }
    .reset-btn { background: none; border: none; cursor: pointer; color: #7eb8e8; font-size: 16px; padding: 0; }
    .reset-btn:hover { color: #fff; }
    .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f5f7fa; }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: #c5d0dc; border-radius: 4px; }
    .msg { display: flex; gap: 8px; animation: fadeUp 0.22s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1a3a5c; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar svg { width: 14px; height: 14px; }
    .msg.user .msg-avatar { background: #dbeafe; }
    .bubble { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; color: #1e293b; }
    .msg.agent .bubble { background: #ffffff; border: 1px solid #e2e8f0; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1a3a5c; color: #ffffff; border-top-right-radius: 4px; }
    .bubble p { margin: 0 0 6px; } .bubble p:last-child { margin-bottom: 0; }
    .bubble ul { margin: 4px 0 4px 16px; } .bubble li { margin-bottom: 2px; }
    .bubble strong { font-weight: 500; }
    .product-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .product-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .product-card-name { font-size: 13px; font-weight: 500; color: #1e293b; line-height: 1.3; }
    .product-card-desc { font-size: 12px; color: #64748b; margin-top: 2px; }
    .product-card-link { font-size: 12px; color: #1a3a5c; text-decoration: none; font-weight: 500; white-space: nowrap; padding: 5px 10px; border: 1px solid #1a3a5c; border-radius: 8px; transition: background 0.15s; }
    .product-card-link:hover { background: #e6f1fb; }
    .cta-whatsapp { margin-top: 10px; display: flex; align-items: center; gap: 8px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 10px 14px; text-decoration: none; color: #166534; font-size: 13px; font-weight: 500; }
    .cta-whatsapp svg { width: 18px; height: 18px; flex-shrink: 0; }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; padding-left: 36px; }
    .qr-btn { font-size: 13px; padding: 7px 13px; border: 1px solid #cbd5e1; border-radius: 20px; background: #fff; color: #1e293b; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
    .qr-btn:hover { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; border-top-left-radius: 4px; width: fit-content; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: typingBounce 1.2s ease infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-5px);opacity:1;} }
    .input-area { padding: 12px 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; background: #fff; flex-shrink: 0; }
    #user-input { flex: 1; border: 1px solid #cbd5e1; border-radius: 20px; padding: 9px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1e293b; outline: none; transition: border 0.15s; }
    #user-input:focus { border-color: #2e6da4; background: #fff; }
    #user-input::placeholder { color: #94a3b8; }
    #send-btn { width: 38px; height: 38px; border-radius: 50%; background: #1a3a5c; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
    #send-btn:hover { background: #2e6da4; } #send-btn:active { transform: scale(0.95); }
    #send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
<div id="vreme-agent">
  <div class="agent-header">
    <div class="agent-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7eb8e8" stroke-width="1.5"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    </div>
    <div class="agent-info">
      <div class="agent-name">Asesor Virtual Vreme</div>
      <div class="agent-status"><span class="status-dot"></span>En línea · Climatización profesional</div>
    </div>
    <span class="vreme-logo">VREME</span>
    <button class="reset-btn" onclick="resetChat()">↺</button>
  </div>
  <div class="messages-area" id="messages"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Escribí tu consulta..." maxlength="500" />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<script>
  let conversationHistory = [];
  let isLoading = false;

  function scrollToBottom() { const a = document.getElementById('messages'); a.scrollTop = a.scrollHeight; }

  function agentIcon() { return `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="#7eb8e8" stroke-width="1.5"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>`; }
  function userIcon() { return `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="#2e6da4" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`; }

  function addUserMessage(text) {
    const area = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `${userIcon()}<div class="bubble">${text.replace(/</g,'&lt;')}</div>`;
    area.appendChild(div); scrollToBottom();
  }

  function addAgentMessage(parsed) {
    const area = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg agent';
    let inner = typeof marked !== 'undefined' ? marked.parse(parsed.text || '') : (parsed.text || '').replace(/\n/g,'<br>');
    let extra = '';
    if (parsed.products?.length) {
      extra += '<div class="product-cards">';
      parsed.products.forEach(p => {
        extra += `<div class="product-card"><div><div class="product-card-name">${p.name}</div><div class="product-card-desc">${p.desc}</div></div><a class="product-card-link" href="${p.url}" target="_blank">Ver más →</a></div>`;
      });
      extra += '</div>';
    }
    if (parsed.showWhatsapp) {
      extra += `<a class="cta-whatsapp" href="https://wa.me/5491153658759" target="_blank"><svg viewBox="0 0 24 24" fill="#166634"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.5 2C6.261 2 2 6.261 2 11.5c0 1.77.487 3.45 1.35 4.9L2 22l5.75-1.512A9.464 9.464 0 0011.5 21C16.739 21 21 16.739 21 11.5S16.739 2 11.5 2zm0 17c-1.58 0-3.05-.45-4.28-1.23l-.31-.18-3.17.83.85-3.08-.2-.32A7.435 7.435 0 014 11.5C4 7.364 7.364 4 11.5 4S19 7.364 19 11.5 15.636 19 11.5 19z"/></svg>Consultar por WhatsApp · +54 9 11 5365-8759</a>`;
    }
    div.innerHTML = `${agentIcon()}<div class="bubble">${inner}${extra}</div>`;
    area.appendChild(div);
    if (parsed.quickReplies?.length) {
      const qrDiv = document.createElement('div');
      qrDiv.className = 'quick-replies';
      parsed.quickReplies.forEach(qr => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn'; btn.textContent = qr;
        btn.onclick = () => { qrDiv.remove(); handleUserInput(qr); };
        qrDiv.appendChild(btn);
      });
      area.appendChild(qrDiv);
    }
    scrollToBottom();
  }

  function showTyping() {
    const area = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg agent'; div.id = 'typing-msg';
    div.innerHTML = `${agentIcon()}<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    area.appendChild(div); scrollToBottom();
  }
  function removeTyping() { const el = document.getElementById('typing-msg'); if (el) el.remove(); }

  async function callBackend(messages) {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });
    if (!response.ok) { const e = await response.json(); throw new Error(e.error || 'Error del servidor'); }
    return response.json();
  }

  async function handleUserInput(text) {
    if (!text.trim() || isLoading) return;
    isLoading = true;
    document.getElementById('user-input').value = '';
    document.getElementById('user-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
    addUserMessage(text);
    showTyping();
    conversationHistory.push({ role: 'user', content: text });
    try {
      const parsed = await callBackend(conversationHistory);
      removeTyping();
      addAgentMessage(parsed);
      conversationHistory.push({ role: 'assistant', content: parsed.text });
    } catch(e) {
      removeTyping();
      addAgentMessage({ text: `Hubo un error: ${e.message}`, products: [], showWhatsapp: false, quickReplies: [] });
    }
    isLoading = false;
    document.getElementById('user-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  function sendMessage() { handleUserInput(document.getElementById('user-input').value.trim()); }

  function resetChat() {
    conversationHistory = [];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('user-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    isLoading = false;
    startConversation();
  }

  document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function startConversation() {
    conversationHistory = [];
    addAgentMessage({
      text: 'Hola, soy el bot de Vreme. Este primer contacto nos permite encaminar tu consulta para que Anto, Hilen, Diego o Maxi puedan ofrecerte la mejor opción. Podés usar una opción automática o escribir tu consulta.',
      products: [],
      showWhatsapp: false,
      quickReplies: ['Caldera nueva', 'Radiadores', 'Piso radiante', 'Aires acondicionados']
    });
  }

  startConversation();
</script>
</body>
</html>
